# Expo/React Native + Metro need a flat node_modules layout.
# pnpm's default symlinked store breaks Metro module resolution, so hoist everything.
nodeLinker: hoisted

# Allow these dependencies to run their install/build scripts (pnpm blocks them by default).
allowBuilds:
  unrs-resolver: true

patchedDependencies:
  expo-location@19.0.8: patches/expo-location@19.0.8.patch
