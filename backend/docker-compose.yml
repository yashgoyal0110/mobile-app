# Simplest VM hosting: runs the API on port 3001 over plain HTTP.
# Good for a quick Expo Go demo. For installable APKs / production add HTTPS
# (see docker-compose.https.yml).
#
#   docker compose up -d --build      # start (reads secrets from ./.env)
#   docker compose logs -f            # watch logs
#   docker compose down               # stop
#
# Backend URL for the app:  http://YOUR_VM_EXTERNAL_IP:3001  (no /api suffix)
services:
  api:
    build: .
    image: tirthride-api
    env_file: .env          # MONGO_URL, JWT_SECRET, etc. (gitignored)
    ports:
      - "3001:8080"         # host 3001 -> container 8080
    restart: unless-stopped
