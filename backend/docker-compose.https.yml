# VM hosting WITH automatic HTTPS (recommended for installable APK / production).
# Caddy terminates TLS on 443 and proxies to the API. Needs a hostname that
# resolves to this VM's public IP.
#
#   # with a real domain:
#   DOMAIN=api.yourdomain.com docker compose -f docker-compose.https.yml up -d --build
#
#   # no domain? use sslip.io — replace dots in your VM IP with dashes:
#   #   34.93.1.50  ->  34-93-1-50.sslip.io
#   DOMAIN=34-93-1-50.sslip.io docker compose -f docker-compose.https.yml up -d --build
#
# Then your backend URL is  https://$DOMAIN  (health check: https://$DOMAIN/api/health)
services:
  api:
    build: .
    image: tirthride-api
    env_file: .env
    restart: unless-stopped
    expose:
      - "8080"            # internal only; not published to the host

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
