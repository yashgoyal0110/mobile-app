# FifthDigit API — nginx reverse-proxy vhost.
#
# Fronts the FifthDigit backend container (published on the host at
# 127.0.0.1:3002) on your existing nginx that already owns ports 80/443.
# Adds WebSocket support for /api/ws. HTTPS is added by certbot (below).
#
# Install on the VM:
#   sudo cp deploy/nginx-fifthdigit.conf /etc/nginx/sites-available/fifthdigit.conf
#   sudo ln -s /etc/nginx/sites-available/fifthdigit.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d 34.143.253.125.nip.io      # obtains + installs the TLS cert
#
# certbot rewrites this file to listen on 443 with the cert and add an 80->443
# redirect. Test:  curl https://34.143.253.125.nip.io/api/uploads/status
#
# NOTE: this assumes nginx runs on the HOST. If your nginx is itself a Docker
# container, change 127.0.0.1:3002 to the host gateway (e.g. 172.17.0.1:3002)
# or put both containers on a shared Docker network and use http://api:3002.

# Uniquely-named map (avoids clashing with a $connection_upgrade map another
# vhost may already define). Sits in the http{} context via sites-enabled include.
map $http_upgrade $fifthdigit_connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name 34.143.253.125.nip.io;

    # Allow large image uploads to pass through (uploads go direct to GCS, but
    # keep this generous for any proxied payloads).
    client_max_body_size 20m;

    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;

        # WebSocket upgrade (for /api/ws)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $fifthdigit_connection_upgrade;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Keep long-lived WebSockets from timing out.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
